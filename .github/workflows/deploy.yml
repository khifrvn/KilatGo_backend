name: Deploy Frontend (cms)

on:
  push:
    branches: [main]
    paths: ['cms/**']          # cuma jalan kalau frontend berubah
  workflow_dispatch: {}

# Backend TIDAK di sini — di-deploy lewat cPanel Git (.cpanel.yml), karena SSH diblok.
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build cms
        working-directory: cms
        run: |
          npm ci
          npm run build
      - name: Deploy ke public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: cms/dist/
          server-dir: public_html/
