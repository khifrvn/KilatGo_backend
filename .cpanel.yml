# cwd = /home/kilb7536/repositories/Kilatgo_backend (= Application root Node.js App).
# DATABASE_URL dibaca dari .env di folder ini.
deployment:
  tasks:
    # Satu baris = satu shell, biar `source` nodevenv nempel. `*` = auto-cocok versi Node.
    - source /home/kilb7536/nodevenv/repositories/Kilatgo_backend/*/bin/activate && npm ci && npx prisma generate && npx prisma migrate deploy && npx tsc && mkdir -p tmp && touch tmp/restart.txt
