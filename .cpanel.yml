deployment:
  tasks:
    # Satu baris = satu shell, biar `source` nodevenv nempel ke perintah berikutnya.
    # GANTI path venv di bawah kalau versi Node bukan 20 (lihat perintah "enter venv" di Setup Node.js App).
    - source /home/kilb7536/nodevenv/kilatgo_backend/20/bin/activate && npm ci && npx prisma generate && npx prisma migrate deploy && npx tsc && mkdir -p tmp && touch tmp/restart.txt
