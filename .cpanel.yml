---
deployment:
  tasks:
    # ---- FRONTEND (cms): copy hasil build statis ke docroot ----
    # cms/dist HARUS sudah ke-build (di lokal / GitHub Actions) dan ikut ke-commit.
    - export DOCROOT=/home/kilb7536/public_html
    - /bin/rm -rf $DOCROOT/*
    - /bin/cp -R cms/dist/* $DOCROOT/

    # ---- BACKEND (Node): sync source ke folder app Node ----
    - export APP=/home/kilb7536/kilatgo_backend
    - /bin/mkdir -p $APP
    - /bin/cp -R dist prisma package.json package-lock.json $APP/
    # restart Passenger/Node app (dibuat otomatis oleh Setup Node.js App)
    - /bin/mkdir -p $APP/tmp && /bin/touch $APP/tmp/restart.txt
